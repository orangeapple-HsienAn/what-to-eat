<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天要吃什麼？- 午餐決策器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(-5%); }
            50% { transform: translateY(0); }
        }
        .animate-bounce-subtle {
            animation: bounce-subtle 2s infinite;
        }
        .result-highlight {
            transition: all 0.3s ease;
        }
        .item-chip {
            transition: all 0.2s;
        }
        .item-chip:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <div class="max-w-md mx-auto px-4 py-12">
        <!-- 標題區 -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-orange-600 mb-2">今天要吃什麼？</h1>
            <p class="text-gray-500">別再猶豫了，交給命運來決定吧！</p>
        </header>

        <!-- 結果顯示區 -->
        <div class="bg-white rounded-3xl shadow-xl p-8 mb-8 text-center border-b-8 border-orange-500 relative overflow-hidden">
            <div id="status-tag" class="absolute top-4 left-1/2 -translate-x-1/2 bg-orange-100 text-orange-600 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-widest hidden">
                正在挑選中...
            </div>
            
            <div id="result-display" class="py-10">
                <span id="lunch-name" class="text-5xl font-extrabold text-gray-700 block mb-4">？</span>
                <p id="result-hint" class="text-gray-400">點擊下方按鈕開始</p>
            </div>

            <button id="spin-btn" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-2xl text-xl shadow-lg transition-all active:scale-95 focus:outline-none">
                幫我決定！
            </button>
        </div>

        <!-- 自定義名單區 -->
        <div class="bg-white rounded-3xl shadow-md p-6">
            <h2 class="text-lg font-bold mb-4 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                </svg>
                我的候選名單
            </h2>
            
            <!-- 新增輸入框 -->
            <div class="flex mb-4 gap-2">
                <input type="text" id="new-item-input" placeholder="新增想吃的..." class="flex-1 bg-gray-100 border-none rounded-xl px-4 py-2 focus:ring-2 focus:ring-orange-500 outline-none">
                <button id="add-item-btn" class="bg-gray-800 text-white px-4 py-2 rounded-xl hover:bg-gray-700 transition-colors">
                    新增
                </button>
            </div>

            <!-- 選項列表 -->
            <div id="items-container" class="flex flex-wrap gap-2">
                <!-- 選項會動態出現在這裡 -->
            </div>

            <div class="mt-6 pt-6 border-t border-gray-100">
                <button id="reset-btn" class="text-sm text-gray-400 hover:text-red-500 transition-colors">
                    重設為預設名單
                </button>
            </div>
        </div>

        <!-- 訊息彈窗 (代替 alert) -->
        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl transition-opacity duration-300 opacity-0 pointer-events-none z-50">
            請至少輸入一個選項喔！
        </div>
    </div>

    <script>
        const defaultItems = ["便當", "牛肉麵", "水餃", "漢堡", "壽司", "火鍋", "沙拉", "義大利麵", "燒肉飯", "便利商店"];
        let items = [...defaultItems];

        const lunchNameDisplay = document.getElementById('lunch-name');
        const resultHint = document.getElementById('result-hint');
        const statusTag = document.getElementById('status-tag');
        const itemsContainer = document.getElementById('items-container');
        const newItemInput = document.getElementById('new-item-input');
        const addItemBtn = document.getElementById('add-item-btn');
        const spinBtn = document.getElementById('spin-btn');
        const resetBtn = document.getElementById('reset-btn');
        const toast = document.getElementById('toast');

        // 初始化渲染列表
        function renderItems() {
            itemsContainer.innerHTML = '';
            items.forEach((item, index) => {
                const chip = document.createElement('div');
                chip.className = 'item-chip bg-orange-50 text-orange-700 px-3 py-1 rounded-lg text-sm flex items-center border border-orange-100 group';
                chip.innerHTML = `
                    <span>${item}</span>
                    <button onclick="removeItem(${index})" class="ml-2 text-orange-300 hover:text-orange-600 focus:outline-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                `;
                itemsContainer.appendChild(chip);
            });
        }

        function removeItem(index) {
            if (items.length <= 1) {
                showToast("至少要留下一個選項喔！");
                return;
            }
            items.splice(index, 1);
            renderItems();
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 2000);
        }

        // 新增項目
        addItemBtn.addEventListener('click', () => {
            const val = newItemInput.value.trim();
            if (val) {
                items.push(val);
                newItemInput.value = '';
                renderItems();
            } else {
                showToast("請輸入食物名稱！");
            }
        });

        newItemInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addItemBtn.click();
        });

        // 決定午餐邏輯 (隨機動畫)
        let isSpinning = false;
        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            if (items.length === 0) {
                showToast("名單空空的喔！");
                return;
            }

            isSpinning = true;
            spinBtn.disabled = true;
            spinBtn.classList.add('opacity-50');
            statusTag.classList.remove('hidden');
            resultHint.innerText = "好運降臨中...";
            
            let counter = 0;
            const maxTicks = 20;
            const interval = setInterval(() => {
                const randomItem = items[Math.floor(Math.random() * items.length)];
                lunchNameDisplay.innerText = randomItem;
                
                counter++;
                if (counter >= maxTicks) {
                    clearInterval(interval);
                    finalizeSelection();
                }
            }, 80);
        });

        function finalizeSelection() {
            const finalChoice = items[Math.floor(Math.random() * items.length)];
            lunchNameDisplay.innerText = finalChoice;
            lunchNameDisplay.classList.add('text-orange-600', 'scale-110');
            
            resultHint.innerText = "今天就決定是這個了！";
            statusTag.classList.add('hidden');
            isSpinning = false;
            spinBtn.disabled = false;
            spinBtn.classList.remove('opacity-50');

            // 撒花效果感 (簡單的顏色閃爍)
            setTimeout(() => {
                lunchNameDisplay.classList.remove('scale-110');
            }, 300);
        }

        // 重設
        resetBtn.addEventListener('click', () => {
            items = [...defaultItems];
            renderItems();
            lunchNameDisplay.innerText = "？";
            lunchNameDisplay.classList.remove('text-orange-600');
            resultHint.innerText = "點擊下方按鈕開始";
        });

        // 初始渲染
        renderItems();
    </script>
</body>
</html>
